name: Supabase Keepalive

on:
  schedule:
    - cron: "0 3,15 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Ping Railway backend keepalive endpoint
        run: node scripts/keepalive.mjs
        env:
          BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
